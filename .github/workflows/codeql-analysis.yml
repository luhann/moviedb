# CodeQL does not support Rust: this only scans scripts/migrate_dynamo.py.
# The actual attack surface (the network-facing src/main.rs API) gets no
# coverage here — that's a gap to close some other way (cargo audit, clippy
# lints), not something this workflow can be pointed at.
name: "CodeQL"

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    - cron: '0 18 * * 2'

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        language: ['python']

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v3
      with:
        languages: ${{ matrix.language }}

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v3
